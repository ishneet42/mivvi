<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="mv-glow-g" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mv-glow-b" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="mv-green" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#BDFFD4"/>
      <stop offset="50%" stop-color="#3BFF66"/>
      <stop offset="100%" stop-color="#23C14A"/>
    </linearGradient>
    <linearGradient id="mv-blue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#C7F2FF"/>
      <stop offset="50%" stop-color="#3BD4FF"/>
      <stop offset="100%" stop-color="#1E9EDE"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100" height="100" rx="22" fill="#141410"/>

  <!-- outer glow halos -->
  <path d="M 22 30 L 40 68 L 58 30"
        stroke="#3BFF66" stroke-width="14" stroke-opacity="0.18"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 50 34 L 68 72 L 86 34"
        stroke="#3BD4FF" stroke-width="14" stroke-opacity="0.18"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- tubes -->
  <path d="M 50 34 L 68 72 L 86 34"
        stroke="url(#mv-blue)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#mv-glow-b)"/>
  <path d="M 22 30 L 40 68 L 58 30"
        stroke="url(#mv-green)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#mv-glow-g)"/>

  <!-- inner hot-cores -->
  <path d="M 50 34 L 68 72 L 86 34"
        stroke="#ffffff" stroke-width="1.6" stroke-opacity="0.85"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 22 30 L 40 68 L 58 30"
        stroke="#ffffff" stroke-width="1.6" stroke-opacity="0.85"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
